; Minimal WS2812B test sketch — cycle red/green/blue/white every 1.5 s.

[platformio]
default_envs = esp32dev
src_dir = .
build_src_filter = +<led-test.ino>

[env:esp32dev]
platform      = espressif32@6.10.0
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 460800
lib_deps      = adafruit/Adafruit NeoPixel @ ^1.12.3