; PlatformIO project config for the WS2812B LED-Controller.
; Docs: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev
src_dir = .
build_src_filter = +<led-controller.ino>

[env:esp32dev]
platform      = espressif32@6.10.0
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 460800
lib_deps      = adafruit/Adafruit NeoPixel @ ^1.12.3